name: SmartCare CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        # Exclude easyocr in CI to avoid downloading 1.5GB of PyTorch on standard runners
        grep -v "easyocr" requirements.txt > test_reqs.txt
        pip install -r test_reqs.txt
        pip install pytest httpx

    - name: Run Backend Tests
      run: |
        cd backend
        # python -m pytest ensures that backend is added to Python path
        python -m pytest app/tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        cd frontend
        # --legacy-peer-deps prevents React 19 / Vite peer conflict failures in CI
        npm install --legacy-peer-deps

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

  build-docker:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub (or similar registry)
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      continue-on-error: true

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: smartcare-backend:latest

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
        tags: smartcare-frontend:latest
